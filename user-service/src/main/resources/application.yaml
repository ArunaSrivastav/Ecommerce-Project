server:
  port: 8010

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: user_admin
    password: secure_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      pool-name: UserServiceHikariCP
  jpa:
    hibernate:
      ddl-auto: update # Use 'validate' if using Flyway/Liquibase
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

#Virtual threads allow your service to handle thousands of concurrent DB connections with minimal memory overhead.
  threads:
    virtual:
      enabled: true  # This is the switch for Java 21 performance


eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVICE_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  #instance:
   # prefer-ip-address: false
