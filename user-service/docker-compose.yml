services:
  user-db:
    image: postgres:16-alpine
    container_name: user-service-db
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_admin -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5